name: Test External

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      moduleSet:
        description: 'Module set'
        required: true
        default: 'nonCompliant'
        type: choice
        options:
        - compliant
        - preFlatconfigCompliant
        - nonCompliant

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  read_external_projects:
    name: Read list of ${{ github.event.inputs.moduleSet || 'compliant' }} external projects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count:  ${{ steps.set-matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: validate-module-set
        env:
          INPUT: ${{ github.event.inputs.moduleSet }}
        run: |
          case "$INPUT" in
            compliant|preFlatconfigCompliant|nonCompliant|"") ;;
            *) echo "::error::Invalid moduleSet: $INPUT"; exit 1 ;;
          esac
          echo "value=${INPUT:-compliant}" >> "$GITHUB_OUTPUT"
      - id: set-matrix
        run: |
          SET="${{ steps.validate-module-set.outputs.value }}"
          echo "matrix=$(cat workflow-external.json | jq -c ".${SET}")" >> "$GITHUB_OUTPUT"
          echo "count=$(cat workflow-external.json | jq ".${SET} | length")" >> "$GITHUB_OUTPUT"

  test_external:
    needs: read_external_projects
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node_version: [lts/*]
        project: ${{ fromJson(needs.read_external_projects.outputs.matrix) }}
    steps:
      - name: Checkout main project
        uses: actions/checkout@v6
        with:
          path: main
      - name: Checkout ${{ matrix.project }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.project }}
          path: project

      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      - name: Determine npm cache directory windows
        id: npm-cache-dir-windows
        if: runner.os == 'Windows'
        run: echo "dir=$(npm config get cache)" >> $env:GITHUB_OUTPUT
      - name: Determine npm cache directory non-windows
        id: npm-cache-dir
        if: runner.os != 'Windows'
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir-windows.outputs.dir || steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: install main
        run: '[ -f package-lock.json ] && npm ci --ignore-scripts --force || npm install --ignore-scripts --force'
        working-directory: ./main
      - name: install project
        run: '[ -f package-lock.json ] && npm ci --ignore-scripts --force || npm install --ignore-scripts --force'
        working-directory: ./project

      - name: build project if needed
        run: npm run build-for-test --if-present
        working-directory: ./project

      - name: find the config file name
        id: eslint-config-file
        run: echo "file=$(test -f eslint.config.mjs && echo "eslint.config.mjs" || echo "eslint.config.js")" >> $GITHUB_OUTPUT
        working-directory: ./project

      - name: modify project eslint config
        run: sed "s/'@voxpelli\/eslint-config'/'..\/main\/index.js'/" ${{ steps.eslint-config-file.outputs.file }} > tmp.eslint.config.js && rm ${{ steps.eslint-config-file.outputs.file }} && mv tmp.eslint.config.js ${{ steps.eslint-config-file.outputs.file }}
        working-directory: ./project

      - name: run eslint
        id: eslint
        run: ../main/node_modules/.bin/eslint --format json --output-file eslint-results.json
        working-directory: ./project

      - name: show lint output in log
        if: ${{ !cancelled() && steps.eslint.conclusion != 'skipped' }}
        run: ../main/node_modules/.bin/eslint --format stylish
        working-directory: ./project
        continue-on-error: true

      - name: prepare result
        if: ${{ !cancelled() && steps.eslint.conclusion != 'skipped' }}
        run: node main/tools/prepare-eslint-result.js
        env:
          PROJECT: ${{ matrix.project }}

      - name: upload result
        if: ${{ !cancelled() && hashFiles('eslint-result.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: eslint-result-${{ strategy.job-index }}-${{ github.run_attempt }}
          path: eslint-result.json
          retention-days: 1

  summary:
    name: Generate test summary
    needs: [test_external, read_external_projects]
    if: ${{ !cancelled() && needs.test_external.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_results: ${{ steps.check.outputs.has_results }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: main
      - name: download all results
        uses: actions/download-artifact@v4
        with:
          pattern: eslint-result-*-${{ github.run_attempt }}
          path: results
      - name: generate comment
        run: node main/tools/generate-canary-comment.js
        env:
          EXTERNAL_PROJECT_COUNT: ${{ needs.read_external_projects.outputs.count }}
      - name: check for results
        id: check
        run: |
          if [ -s comment.md ]; then
            echo "has_results=true"  >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi
      - name: write step summary
        run: cat comment.md >> $GITHUB_STEP_SUMMARY
      - name: upload comment
        uses: actions/upload-artifact@v4
        with:
          name: canary-comment-${{ github.run_attempt }}
          path: comment.md
          retention-days: 1

  post_comment:
    name: Post sticky PR comment
    needs: [summary]
    if: ${{ !cancelled() && github.event.pull_request.number && needs.summary.result == 'success' }}
    runs-on: ubuntu-latest
    environment: pr-bot
    permissions:
      contents: read
    steps:
      - name: mint app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: '1082006'
          private-key: ${{ secrets.APP_PEM }}
      - name: download comment
        uses: actions/download-artifact@v4
        with:
          name: canary-comment-${{ github.run_attempt }}
      - name: post sticky comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          header: external-test-results
          path: comment.md
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
